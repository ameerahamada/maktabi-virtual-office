<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>مكتبي — اختر مساحة العمل</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --brand:#8b2fd9; --brand-600:#9b44e6; --brand-700:#6f1fb8;
    --brand-soft:#f1e7fc; --brand-tint:#f8f3fe;
    --bg:#eceef4; --surface:#ffffff; --surface-2:#f7f8fc; --surface-3:#f0f2f8;
    --ink:#15192b; --ink-2:#3c4259; --muted:#7c8295; --faint:#a7adbf;
    --line:#e6e8f1; --line-2:#eef0f6;
    --green:#1f9d6b; --amber:#c5841a;
    --r-md:12px; --r-lg:16px; --r-xl:22px;
    --sh-sm:0 1px 2px rgba(21,25,43,.05),0 1px 1px rgba(21,25,43,.04);
    --sh-md:0 4px 16px rgba(21,25,43,.07),0 1px 3px rgba(21,25,43,.05);
    --sh-lg:0 18px 50px rgba(21,25,43,.14),0 4px 14px rgba(21,25,43,.08);
    --sh-brand:0 12px 30px rgba(139,47,217,.28);
    --ease:cubic-bezier(.22,.61,.36,1);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'IBM Plex Sans Arabic',sans-serif;color:var(--ink);font-size:14px;line-height:1.5;
    -webkit-font-smoothing:antialiased;min-height:100vh;
    background:
      radial-gradient(820px 420px at 50% -8%, var(--brand-tint) 0%, transparent 62%),
      radial-gradient(700px 600px at 100% 120%, #f1f2fb 0%, transparent 55%),
      var(--bg);}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit}
  a{color:inherit;text-decoration:none}
  ::selection{background:var(--brand-soft)}
  svg{display:block}

  .page{min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:40px 24px 32px}

  /* brand top */
  .brand{display:flex;align-items:center;gap:11px;margin-bottom:auto}
  .brand .mark{width:38px;height:38px;border-radius:11px;
    background:linear-gradient(150deg,var(--brand-600),var(--brand-700));
    display:grid;place-items:center;color:#fff;font-weight:700;font-size:20px;box-shadow:var(--sh-brand)}
  .brand .name{font-weight:700;font-size:18px;letter-spacing:-.2px}
  .brand .name small{display:block;font-size:10.5px;font-weight:500;color:var(--faint);letter-spacing:.4px}

  /* centered shell */
  .shell{width:100%;max-width:520px;margin:auto;animation:rise .55s var(--ease) both}
  @keyframes rise{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:none}}

  .head{text-align:center;margin-bottom:26px}
  .head .badge{display:inline-flex;align-items:center;gap:7px;height:30px;padding:0 13px;border-radius:999px;
    background:var(--surface);border:1px solid var(--line);box-shadow:var(--sh-sm);
    font-size:12px;font-weight:600;color:var(--ink-2);margin-bottom:18px}
  .head .badge svg{color:var(--brand)}
  .head h1{font-size:27px;font-weight:700;letter-spacing:-.5px}
  .head p{margin-top:9px;color:var(--muted);font-size:14.5px}

  /* card list */
  .list{display:flex;flex-direction:column;gap:12px}
  .company{
    --pad:16px;display:flex;align-items:center;gap:15px;width:100%;text-align:start;
    background:var(--surface);border:1.5px solid var(--line);border-radius:var(--r-lg);
    padding:var(--pad);transition:.2s var(--ease);position:relative;box-shadow:var(--sh-sm);
    opacity:0;animation:rise .5s var(--ease) forwards}
  .company:hover{border-color:#cfd4ea;box-shadow:var(--sh-md);transform:translateY(-2px)}
  .company.sel{border-color:var(--brand);box-shadow:0 0 0 4px var(--brand-soft),var(--sh-md)}

  .logo{width:52px;height:52px;border-radius:14px;flex:none;display:grid;place-items:center;
    color:#fff;font-weight:700;font-size:20px;box-shadow:var(--sh-sm)}

  .info{flex:1;min-width:0}
  .info .top{display:flex;align-items:center;gap:9px}
  .info .top b{font-size:16px;font-weight:700;letter-spacing:-.2px}
  .last{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:600;
    color:var(--green);background:var(--green-soft,#e6f5ee);border-radius:6px;padding:2px 8px}
  .last svg{opacity:.9}
  .meta{margin-top:5px;display:flex;align-items:center;gap:12px;font-size:12.5px;color:var(--muted)}
  .meta .m{display:flex;align-items:center;gap:6px}
  .meta .m svg{color:var(--faint)}
  .meta .role{color:var(--ink-2);font-weight:600}
  .dotsep{width:3px;height:3px;border-radius:50%;background:var(--faint)}

  /* radio check */
  .pick{width:24px;height:24px;border-radius:50%;border:2px solid var(--line);flex:none;
    display:grid;place-items:center;transition:.18s var(--ease)}
  .pick svg{opacity:0;color:#fff;transform:scale(.5);transition:.18s var(--ease)}
  .company.sel .pick{background:var(--brand);border-color:var(--brand)}
  .company.sel .pick svg{opacity:1;transform:scale(1)}

  /* primary action */
  .cta{margin-top:24px}
  .btn{display:flex;align-items:center;justify-content:center;gap:9px;width:100%;height:54px;
    background:var(--brand);color:#fff;border-radius:15px;font-weight:700;font-size:15.5px;
    box-shadow:var(--sh-brand);transition:.18s var(--ease)}
  .btn:hover{background:var(--brand-600);transform:translateY(-1px);box-shadow:0 16px 36px rgba(139,47,217,.34)}
  .btn:active{transform:translateY(0)}

  .foot{margin-top:30px;display:flex;align-items:center;justify-content:center;gap:7px;
    font-size:13px;color:var(--muted)}
  .foot a{font-weight:600;color:var(--brand)}
  .foot a:hover{text-decoration:underline;text-underline-offset:3px}

  .signout{margin-top:14px;text-align:center}
  .signout button{display:inline-flex;align-items:center;gap:7px;font-size:12.5px;color:var(--faint);font-weight:500}
  .signout button:hover{color:var(--muted)}
</style>
</head>
<body>
<div class="page">

  <div class="brand">
    <div class="mark">م</div>
    <div class="name">مكتبي<small>المكتب الافتراضي</small></div>
  </div>

  <div class="shell">
    <div class="head">
      <span class="badge">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M4 8l8-5 8 5M5 8v11h14V8M9 19v-5h6v5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        ٣ مساحات عمل متاحة
      </span>
      <h1>اختر مساحة العمل</h1>
      <p>حدد الشركة التي تريد الدخول إليها الآن</p>
    </div>

    <div class="list" role="radiogroup" aria-label="اختر مساحة العمل">

      <!-- selected by default: last entered -->
      <button class="company sel" role="radio" aria-checked="true" style="animation-delay:.05s">
        <div class="logo" style="background:linear-gradient(150deg,#8b3fe0,#6f1fb8)">أ</div>
        <div class="info">
          <div class="top">
            <b>شركة أُفُق</b>
            <span class="last">
              <svg width="12" height="12" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/><path d="M12 8v4l3 2" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
              آخر دخول
            </span>
          </div>
          <div class="meta">
            <span class="m role">مطوّرة واجهات</span>
            <span class="dotsep"></span>
            <span class="m">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><rect x="4" y="3" width="16" height="18" rx="2" stroke="currentColor" stroke-width="2"/><path d="M4 9h16M4 15h16" stroke="currentColor" stroke-width="2"/></svg>
              ٣ طوابق متاحة
            </span>
          </div>
        </div>
        <span class="pick"><svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M5 12l5 5 9-9" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
      </button>

      <button class="company" role="radio" aria-checked="false" style="animation-delay:.12s">
        <div class="logo" style="background:linear-gradient(150deg,#1f9d6b,#157a51)">ن</div>
        <div class="info">
          <div class="top"><b>نَوى للتقنية</b></div>
          <div class="meta">
            <span class="m role">عضو فريق</span>
            <span class="dotsep"></span>
            <span class="m">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><rect x="4" y="3" width="16" height="18" rx="2" stroke="currentColor" stroke-width="2"/><path d="M4 9h16M4 15h16" stroke="currentColor" stroke-width="2"/></svg>
              طابقان متاحان
            </span>
          </div>
        </div>
        <span class="pick"><svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M5 12l5 5 9-9" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
      </button>

      <button class="company" role="radio" aria-checked="false" style="animation-delay:.19s">
        <div class="logo" style="background:linear-gradient(150deg,#c5841a,#9c6510)">و</div>
        <div class="info">
          <div class="top"><b>وميض الإبداع</b></div>
          <div class="meta">
            <span class="m role">عضو فريق</span>
            <span class="dotsep"></span>
            <span class="m">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><rect x="4" y="3" width="16" height="18" rx="2" stroke="currentColor" stroke-width="2"/><path d="M4 9h16M4 15h16" stroke="currentColor" stroke-width="2"/></svg>
              ٤ طوابق متاحة
            </span>
          </div>
        </div>
        <span class="pick"><svg width="13" height="13" viewBox="0 0 24 24" fill="none"><path d="M5 12l5 5 9-9" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
      </button>

    </div>

    <div class="cta">
      <button class="btn" onclick="window.location.href='device-check.html'">
        الدخول إلى المكتب
        <svg width="19" height="19" viewBox="0 0 24 24" fill="none"><path d="M19 12H5M11 6l-6 6 6 6" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </div>

    <div class="foot">
      لا ترى شركتك؟ <a href="#">تواصل مع مشرف مساحة العمل</a>
    </div>

    <div class="signout">
      <button onclick="window.location.href='login.html'">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none"><path d="M14 4h4a2 2 0 012 2v12a2 2 0 01-2 2h-4M10 8l-4 4 4 4M6 12h11" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        تسجيل الخروج من الحساب
      </button>
    </div>
  </div>
</div>

<script>
  const cards=[...document.querySelectorAll('.company')];
  cards.forEach(c=>c.addEventListener('click',()=>{
    cards.forEach(x=>{x.classList.remove('sel');x.setAttribute('aria-checked','false')});
    c.classList.add('sel');c.setAttribute('aria-checked','true');
  }));
</script>
</body>
</html>
